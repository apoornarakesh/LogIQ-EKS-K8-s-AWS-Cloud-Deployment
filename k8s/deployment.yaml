apiVersion: apps/v1
kind: Deployment
metadata:
  name: logiq-dashboard
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logiq-dashboard
  template:
    metadata:
      labels:
        app: logiq-dashboard
    spec:
      containers:
      - name: logiq-dashboard
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/logiq-dashboard:latest
        ports:
        - containerPort: 8000
        env:
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: email-user
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: email-secrets
              key: email-pass
        - name: AWS_REGION
          value: "us-east-1"
        - name: ENVIRONMENT
          value: "production"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: logiq-dashboard-service
spec:
  selector:
    app: logiq-dashboard
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
